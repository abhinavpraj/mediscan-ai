services:
  backend:
    build: .
    environment:
      MEDISCAN_DATABASE_PATH: /app/backend/database/mediscan.sqlite3
      MEDISCAN_UPLOAD_DIR: /app/backend/database/uploads
      MEDISCAN_MODEL_PATH: /app/models/phi-3-mini.gguf
    ports:
      - "8000:8000"
    volumes:
      - mediscan-data:/app/backend/database
      - ./models:/app/models:ro
  frontend:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  mediscan-data:
