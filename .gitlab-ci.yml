stages:
  - format
  - lint
  - type_check
  - test
  - coverage
  - security
  - build
  - package

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "$CI_PROJECT_DIR/backend"

cache:
  paths:
    - .cache/pip
    - frontend/node_modules/

# ----------------- FORMAT STAGE -----------------

backend-format:
  image: python:3.11
  stage: format
  before_script:
    - pip install black isort
  script:
    - black --check backend
    - isort --check-only backend

frontend-format:
  image: node:22
  stage: format
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run format

# ----------------- LINT STAGE -----------------

backend-lint:
  image: python:3.11
  stage: lint
  before_script:
    - pip install ruff
  script:
    - ruff check backend

frontend-lint:
  image: node:22
  stage: lint
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run lint

docs-lint:
  image: node:22
  stage: lint
  before_script:
    - npm install -g markdownlint-cli
    - python3 -m pip install yamllint
  script:
    - markdownlint README.md docs/*.md CONTRIBUTING.md CHANGELOG.md CODE_OF_CONDUCT.md SECURITY.md
    - yamllint .

# ----------------- TYPE CHECK STAGE -----------------

backend-typecheck:
  image: python:3.11
  stage: type_check
  before_script:
    - pip install -r backend/requirements.txt
  script:
    - mypy backend/app

frontend-typecheck:
  image: node:22
  stage: type_check
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run typecheck

# ----------------- TEST STAGE -----------------

backend-test:
  image: python:3.11
  stage: test
  before_script:
    - apt-get update && apt-get install -y tesseract-ocr libgl1 libglib2.0-0
    - pip install -r backend/requirements.txt
  script:
    - pytest backend/tests --cov=backend/app --cov-report=xml --cov-report=term
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
      - .coverage

frontend-test:
  image: node:22
  stage: test
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run test

# ----------------- COVERAGE STAGE -----------------

coverage-check:
  image: python:3.11
  stage: coverage
  dependencies:
    - backend-test
  before_script:
    - pip install coverage
  script:
    - coverage report --fail-under=70

# ----------------- SECURITY STAGE -----------------

dependency-audit:
  image: python:3.11
  stage: security
  before_script:
    - pip install pip-audit
  script:
    - pip-audit -r backend/requirements.txt
    - cd frontend && npm audit --audit-level=high

security-scan:
  image: python:3.11
  stage: security
  before_script:
    - pip install bandit detect-secrets
  script:
    - bandit -r backend/app
    - detect-secrets scan --all-files

# ----------------- BUILD STAGE -----------------

python-build:
  image: python:3.11
  stage: build
  before_script:
    - pip install build
  script:
    - python -m build
  artifacts:
    paths:
      - dist/

docker-build:
  image: docker:27
  stage: build
  services:
    - docker:27-dind
  script:
    - docker build -t mediscan-ai:$CI_COMMIT_SHA .

# ----------------- PACKAGE STAGE -----------------

artifact-generation:
  image: alpine:3.20
  stage: package
  script:
    - tar -czf mediscan-ai-source.tar.gz README.md backend frontend docs sample_reports sample_outputs Dockerfile docker-compose.yml
  artifacts:
    paths:
      - mediscan-ai-source.tar.gz
