stages:
  - test
  - lint

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "$CI_PROJECT_DIR/backend"

default:
  image: nikolaik/python-nodejs:python3.11-nodejs22

  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - .venv/
      - frontend/node_modules/
  before_script:
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip
    - pip install -r backend/requirements.txt
    - cd frontend
    - npm ci
    - cd ..

# ----------------- JOBS -----------------

test:
  stage: test
  script:
    - source .venv/bin/activate
    - |
      if command -v pytest >/dev/null 2>&1; then
        pytest
      else
        echo "pytest is not installed, skipping backend tests."
      fi
    - cd frontend
    - |
      if [ -f package.json ] && grep -q '"test":' package.json; then
        npm run test
      else
        echo "No frontend test script found, skipping."
      fi

lint:
  stage: lint
  script:
    - source .venv/bin/activate
    - |
      if command -v ruff >/dev/null 2>&1; then
        ruff check .
      else
        echo "ruff is not installed, skipping backend lint."
      fi
    - cd frontend
    - |
      if [ -f package.json ] && grep -q '"lint":' package.json; then
        npm run lint
      else
        echo "No frontend lint script found, skipping."
      fi