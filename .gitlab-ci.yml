stages:
  - test
  - lint
  - format
  - type_check
  - coverage

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "$CI_PROJECT_DIR/backend"

default:
  image: nikolaik/python-nodejs:python3.11-nodejs22
  tags:
    - python
    - docker
    - linux
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - .venv/
      - frontend/node_modules/
  before_script:
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip
    - pip install -r backend/requirements.txt
    - cd frontend
    - npm ci
    - cd ..

# ----------------- JOBS -----------------

test:
  stage: test
  script:
    - source .venv/bin/activate
    - pytest
    - cd frontend
    - |
      if [ -f package.json ] && grep -q '"test":' package.json; then
        npm run test
      else
        echo "No frontend test script found, skipping."
      fi

lint:
  stage: lint
  script:
    - source .venv/bin/activate
    - ruff check .
    - cd frontend
    - npm run lint

format:
  stage: format
  script:
    - source .venv/bin/activate
    - ruff format --check .
    - cd frontend
    - npm run format:check

type_check:
  stage: type_check
  script:
    - source .venv/bin/activate
    - mypy
    - cd frontend
    - npm run type-check

coverage:
  stage: coverage
  script:
    - source .venv/bin/activate
    - pytest --cov=app --cov-report=xml
  artifacts:
    name: "coverage-report"
    paths:
      - coverage.xml
    expire_in: 1 week
